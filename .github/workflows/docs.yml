name: Deploy Docs

on:
  push:
    branches: ["main"]
    paths: ["site/**", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          # Full history: add-sitemap-lastmod.mjs stamps per-file git dates.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Regenerate llms.txt from docs (freshness guarantee)
        run: python3 scripts/gen_llms.py
      - name: Check EN/ES translation parity
        run: node scripts/check-i18n-parity.mjs
        working-directory: site
      - name: Build site
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: site
      - name: Validate HTML
        run: pnpm run html-validate
        working-directory: site
      - name: Accessibility audit (pa11y, WCAG2AA)
        run: pnpm run pa11y
        working-directory: site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
