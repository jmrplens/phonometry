<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600"><rect width="900" height="600" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Modelo del umbral de audición (ISO 7029 por edad, cero ISO 389-7)</text><rect x="180.0" y="56" width="540.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="84" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle" font-weight="600">Edad Y,  sexo,  fractil poblacional Q</text><text x="450.0" y="106" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9a9a9a" text-anchor="middle">frecuencias audiométricas 125 Hz – 8000 Hz</text><line x1="450.0" y1="118" x2="450.0" y2="143.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 152.0 L 446.4 143.0 L 453.6 143.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="140.0" y="152" width="620.0" height="60.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="450.0" y="178" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Desviación mediana respecto a los 18 años   (ISO 7029, 4.2)</text><text x="450.0" y="199" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">dHmd = a · (Y − 18) ^ b   (Tabla 1, por sexo)</text><rect x="140.0" y="244" width="620.0" height="60.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="270" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Dispersión su / sl   (ISO 7029, 4.3)</text><text x="450.0" y="291" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">polinomios de grado 5 en (Y − 18)   (Tablas 2–5)</text><rect x="140.0" y="336" width="620.0" height="60.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="362" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Umbral del fractil   (ISO 7029, 4.4)</text><text x="450.0" y="383" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">dHQ = dHmd + z(Q) * s   (su si Q &gt;= 0.5, si no sl)</text><line x1="450.0" y1="212" x2="450.0" y2="235.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 244.0 L 446.4 235.0 L 453.6 235.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="304" x2="450.0" y2="327.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 336.0 L 446.4 327.0 L 453.6 327.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="396" x2="450.0" y2="421.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 430.0 L 446.4 421.0 L 453.6 421.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="140.0" y="430" width="620.0" height="58" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.4"/><text x="450.0" y="456" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#e6e6e6" text-anchor="middle" font-weight="600">Nivel del umbral de audición esperado (dB HL)</text><text x="450.0" y="476" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#4da3d8" text-anchor="middle">referido al cero audiométrico</text><rect x="140.0" y="506" width="620.0" height="52" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="450.0" y="530" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Cero audiométrico = umbral de referencia ISO 389-7</text><text x="450.0" y="549" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">campo libre / campo difuso (Tabla 1) — el cero dB HL / dB SPL</text></svg>