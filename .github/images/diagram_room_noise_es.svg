middle" font-weight="600">Valor NC en cada banda</text><text x="232.0" y="304" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">nivel de la curva = L(f) en esa f</text><rect x="46.0" y="354" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="232.0" y="381" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">NC = curva más alta tocada</text><text x="232.0" y="402" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">anotar la banda determinante</text><line x1="232.0" y1="220" x2="232.0" y2="247.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 256.0 L 228.4 247.0 L 235.6 247.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="232.0" y1="318" x2="232.0" y2="345.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 354.0 L 228.4 345.0 L 235.6 345.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="232.0" y1="416" x2="232.0" y2="461.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 470.0 L 228.4 461.0 L 235.6 461.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="46.0" y="470" width="372.0" height="58" rx="10" fill="none" stroke="#1f77b4" stroke-width="2.4"/><text x="232.0" y="505" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="23" fill="#1a1a1a" text-anchor="middle" font-weight="600">NC-NN (banda)</text><rect x="482.0" y="158" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#d62728" stroke-width="2"/><text x="668.0" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">RC Mark II  (Anexo D)</text><text x="668.0" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">curvas de −5 dB/octava</text><rect x="482.0" y="256" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="668.0" y="283" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">LMF = (L500 + L1000 + L2000) / 3</text><text x="668.0" y="304" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">RC = redondeo(LMF)   (cláusula D.4)</text><line x1="668.0" y1="220" x2="668.0" y2="247.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 256.0 L 664.4 247.0 L 671.6 247.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="668.0" y1="318" x2="668.0" y2="345.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 354.0 L 664.4 345.0 L 671.6 345.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="482.0" y="354" width="372.0" height="116" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="668.0" y="379" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Etiqueta espectral  (cláusula D.3)</text><text x="500.0" y="403" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="start">R  retumbo: una banda ≤ 500 Hz supera RC en &gt; 5 dB</text><text x="500.0" y="425" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="start">H  siseo: una banda ≥ 1000 Hz supera RC en &gt; 3 dB</text><text x="500.0" y="447" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="start">N  neutro: dentro de ambas tolerancias</text><line x1="668.0" y1="470" x2="668.0" y2="481.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 490.0 L