<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520"><rect width="900" height="520" fill="#ffffff"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#1a1a1a" text-anchor="middle">Prominencia de sonidos impulsivos y ajuste de LAeq (NT ACOU 112)</text><rect x="130.0" y="56" width="640.0" height="60.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="450.0" y="82" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#1a1a1a" text-anchor="middle" font-weight="600">Historia del nivel ponderado A  L_pAF  (ponderación F)</text><text x="450.0" y="103" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">un arranque = tramo donde el gradiente supera 10 dB/s (cláusulas 4.5-4.7)</text><line x1="450.0" y1="116" x2="450.0" y2="141.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 150.0 L 446.4 141.0 L 453.6 141.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="130.0" y="150" width="640.0" height="60.0" rx="10" fill="#f0f2f5" stroke="#1f77b4" stroke-width="2"/><text x="450.0" y="176" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Por impulso: tasa de crecimiento OR y diferencia de nivel LD</text><text x="450.0" y="197" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">OR = pendiente de crecimiento [dB/s],   LD = Le − Ls [dB]</text><rect x="130.0" y="242" width="640.0" height="60.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="450.0" y="268" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Prominencia prevista  P   (cláusula 7, Fórmula 1)</text><text x="450.0" y="289" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">P = 3·lg(OR) + 2·lg(LD);   la P más alta en 30 min gobierna</text><rect x="130.0" y="334" width="640.0" height="60.0" rx="10" fill="#f0f2f5" stroke="#d62728" stroke-width="2"/><text x="450.0" y="360" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Ajuste  KI   (cláusula 8, Fórmula 2)</text><text x="450.0" y="381" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">KI = 1.8·(P − 5) dB si P &gt; 5, si no 0</text><line x1="450.0" y1="210" x2="450.0" y2="233.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 242.0 L 446.4 233.0 L 453.6 233.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="302" x2="450.0" y2="325.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 334.0 L 446.4 325.0 L 453.6 325.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="394" x2="450.0" y2="417.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 426.0 L 446.4 417.0 L 453.6 417.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="130.0" y="426" width="640.0" height="60" rx="10" fill="none" stroke="#1f77b4" stroke-width="2.4"/><text x="450.0" y="452" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Nivel de evaluación  LAr,T = 10·lg( (1/T) Σ Δt·10^((LAeq+KI)/10) )</text><text x="450.0" y="473" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">nivel ajustado por impulsos sobre el tiempo de referencia  (Nota 1)</text></svg>