<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"><rect width="900" height="500" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Simulación de ondas FDTD acústica 2D (leapfrog escalonado)</text><rect x="120.0" y="48" width="320.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="280.0" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Dominio  c(x, y), ρ(x, y), dx</text><text x="280.0" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">celdas cuadradas; dt desde el número de Courant</text><rect x="460.0" y="48" width="320.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="620.0" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Geometría y contornos</text><text x="620.0" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">bordes rígidos, de impedancia o absorbentes; obstáculos</text><line x1="280.0" y1="106" x2="381.64370978203266" y2="146.65748391281306" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 390.0 150.0 L 380.3 150.0 L 383.0 143.3 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="620.0" y1="106" x2="518.3562902179673" y2="146.65748391281306" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 510.0 150.0 L 517.0 143.3 L 519.7 150.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="120.0" y="150" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="175" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Fuentes  s(t) inyectadas en celdas  (malla de Ec. 4.11-4.12)</text><text x="450.0" y="195" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">pulso gaussiano, tono con rampa o señal muestreada arbitraria</text><rect x="120.0" y="238" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="450.0" y="263" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Actualización leapfrog en malla escalonada  (Ecs. 4.11-4.12)</text><text x="450.0" y="283" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">v ← v − (dt/ρ·dx)·grad p,  y luego  p ← p − (ρc²·dt/dx)·div v</text><rect x="120.0" y="326" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="450.0" y="351" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">estable mientras  CN = c·dt·√2/dx ≤ 1  (Ecs. 4.13-4.14)</text><text x="450.0" y="371" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">resolver ≥ 10 celdas por longitud de onda para baja dispersión</text><line x1="450.0" y1="208" x2="450.0" y2="229.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 238.0 L 446.4 229.0 L 453.6 229.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="296" x2="450.0" y2="317.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 326.0 L 446.4 317.0 L 453.6 317.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="384" x2="450.0" y2="405.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 414.0 L 446.4 405.0 L 453.6 405.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="120.0" y="414" width="660.0" height="58.0" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.4"/><text x="450.0" y="439" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">FDTDResult:  historias de sonda p(t), instantáneas del campo, .plot()</text><text x="450.0" y="459" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">determinista: mismas entradas, salidas idénticas bit a bit</text></svg>