name: Deploy Docs

on:
  push:
    branches: ["main"]
    paths: ["site/**", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          # Full history: add-sitemap-lastmod.mjs stamps per-file git dates.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Regenerate llms.txt from docs (freshness guarantee)
        run: python3 scripts/gen_llms.py
      - name: Check EN/ES translation parity
        run: node scripts/check-i18n-parity.mjs
        working-directory: site
      - name: Build site
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: site
      - name: Validate HTML
        run: pnpm run html-validate
        working-directory: site
      - name: Accessibility audit (pa11y, WCAG2AA)
        run: pnpm run pa11y
        working-directory: site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Submit sitemap URLs to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          set -euo pipefail
          BASE="https://jmrplens.github.io/phonometry"
          # The key file must be reachable before submitting.
          curl -sf "${BASE}/${INDEXNOW_KEY}.txt" >/dev/null
          urls=$(curl -sf "${BASE}/sitemap-0.xml" | grep -oP '(?<=<loc>)[^<]+')
          payload=$(printf '%s\n' "$urls" | python3 -c '
          import json, os, sys
          urls = [u.strip() for u in sys.stdin if u.strip()]
          print(json.dumps({
              "host": "jmrplens.github.io",
              "key": os.environ["INDEXNOW_KEY"],
              "keyLocation": "https://jmrplens.github.io/phonometry/" + os.environ["INDEXNOW_KEY"] + ".txt",
              "urlList": urls,
          }))')
          code=$(curl -s -o /tmp/indexnow-resp -w "%{http_code}" \
            -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$payload")
          echo "IndexNow HTTP $code ($(printf '%s\n' "$urls" | wc -l) URLs)"
          cat /tmp/indexnow-resp || true
          [ "$code" = "200" ] || [ "$code" = "202" ]
