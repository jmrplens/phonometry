<svg xmlns="http://www.w3.org/2000/svg" width="900" height="490" viewBox="0 0 900 490"><rect width="900" height="490" fill="#ffffff"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#1a1a1a" text-anchor="middle">Zwicker loudness model chain (ISO 532-1)</text><rect x="116.0" y="46" width="668.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="450.0" y="70" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">28 one-third-octave band levels, 25 Hz to 12.5 kHz</text><text x="450.0" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">from a spectrum, or from a calibrated signal via the Annex A filterbank</text><line x1="450.0" y1="104" x2="450.0" y2="123.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 132.0 L 446.4 123.0 L 453.6 123.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="116.0" y="132" width="668.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#1f77b4" stroke-width="2"/><text x="450.0" y="157" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Equal-loudness correction and lower critical bands  (Clause 5.4, Table A.3)</text><text x="450.0" y="177" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">the 11 lowest bands grouped into 3 critical bands, 25-250 Hz</text><rect x="116.0" y="218" width="668.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="450.0" y="243" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Core loudness of the 20 critical bands  (Tables A.4-A.7)</text><text x="450.0" y="263" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">a₀ transmission (A.4), diffuse-field DDF (A.5), threshold in quiet LTQ (A.6)</text><rect x="116.0" y="304" width="668.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#d62728" stroke-width="2"/><text x="450.0" y="329" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Specific loudness  N′(z)  over 0.1-Bark steps to 24 Bark</text><text x="450.0" y="349" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">upper masking slopes added band to band (Table A.9)</text><line x1="450.0" y1="190" x2="450.0" y2="209.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 218.0 L 446.4 209.0 L 453.6 209.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="276" x2="450.0" y2="295.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 304.0 L 446.4 295.0 L 453.6 295.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="362" x2="450.0" y2="383.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 392.0 L 446.4 383.0 L 453.6 383.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="116.0" y="392" width="668.0" height="60" rx="10" fill="none" stroke="#1f77b4" stroke-width="2.4"/><text x="450.0" y="417" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Total loudness  N = ∫ N′(z) dz  [sone]</text><text x="450.0" y="438" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">loudness level  LN = 40 + 10·log₂ N  [phon]</text></svg>