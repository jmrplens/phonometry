etica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Monte Carlo  (Suppl. 1, 7)</text><text x="668.0" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">draw x_i from its PDF g(x_i)</text><rect x="482.0" y="250" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="668.0" y="277" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Propagate M trials</text><text x="668.0" y="298" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">y_r = f(x_1r, …, x_Nr)</text><rect x="482.0" y="342" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="668.0" y="369" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Sort {y_r}, take fractiles</text><text x="668.0" y="390" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">prob.-symmetric 95 % interval</text><line x1="668.0" y1="220" x2="668.0" y2="241.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 250.0 L 664.4 241.0 L 671.6 241.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="668.0" y1="312" x2="668.0" y2="333.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 342.0 L 664.4 333.0 L 671.6 333.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="668.0" y1="404" x2="668.0" y2="425.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 434.0 L 664.4 425.0 L 671.6 425.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="482.0" y="434" width="372.0" height="58" rx="10" fill="none" stroke="#e46a6a" stroke-width="2.4"/><text 