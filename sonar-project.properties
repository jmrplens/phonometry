# Project identification
sonar.projectKey=jmrplens_phonometry
sonar.organization=jmrplens

# Path to sources and tests
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.13

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Coverage configuration
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/__pycache__/**, **/*.png, **/*.md
sonar.test.inclusions=tests/**/test_*.py
# Exclude overload-heavy type-stub files from duplication analysis
sonar.cpd.exclusions=src/phonometry/__init__.py,src/phonometry/metrology/core.py

# Increase authorized parameters for scientific APIs. event_level and
# noise_contour mirror the ECAC Doc 29 single-event parameter set (NPD tables
# plus per-segment masks); all extras are keyword-only optionals, so the
# parameter count is the standard's, not incidental complexity.
sonar.issue.ignore.multicriteria=S107A,S107B
sonar.issue.ignore.multicriteria.S107A.ruleKey=python:S107
sonar.issue.ignore.multicriteria.S107A.resourceKey=src/phonometry/__init__.py
sonar.issue.ignore.multicriteria.S107B.ruleKey=python:S107
sonar.issue.ignore.multicriteria.S107B.resourceKey=src/phonometry/aircraft/airport_noise.py
