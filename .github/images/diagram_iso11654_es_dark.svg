<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520"><rect width="900" height="520" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Valoración de la absorción sonora en índice único (ISO 11654)</text><rect x="118.0" y="46" width="664.0" height="54.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="68" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">αs medido en tercios de octava, 200 Hz a 5000 Hz</text><text x="450.0" y="88" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">en cámara reverberante (ISO 354)</text><line x1="450.0" y1="100" x2="450.0" y2="119.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 128.0 L 446.4 119.0 L 453.6 119.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="118.0" y="128" width="664.0" height="54.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="450.0" y="151" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">αp práctico por banda de octava, 250 Hz a 4000 Hz  (Cláusula 4.1)</text><text x="450.0" y="170" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">media de los tres tercios de octava, redondeado a 0,05</text><rect x="118.0" y="206" width="664.0" height="54.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="229" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Desplazar la curva de referencia en pasos de 0,05 hasta el mejor ajuste  (Cláusula 4.2)</text><text x="450.0" y="248" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">suma de desviaciones desfavorables ≤ 0,10</text><rect x="118.0" y="284" width="664.0" height="54.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="307" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Coeficiente ponderado  αw = referencia desplazada a 500 Hz</text><text x="450.0" y="326" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle"></text><rect x="118.0" y="362" width="664.0" height="54.0" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="450.0" y="385" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Indicadores de forma (L, M, H) donde  αp − referencia ≥ 0,25</text><text x="450.0" y="404" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle"></text><line x1="450.0" y1="100" x2="450.0" y2="119.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 128.0 L 446.4 119.0 L 453.6 119.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="182" x2="450.0" y2="197.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 206.0 L 446.4 197.0 L 453.6 197.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="260" x2="450.0" y2="275.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 284.0 L 446.4 275.0 L 453.6 275.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="338" x2="450.0" y2="353.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 362.0 L 446.4 353.0 L 453.6 353.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="416" x2="450.0" y2="435.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 444.0 L 446.4 435.0 L 453.6 435.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="118.0" y="444" width="664.0" height="58" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.4"/><text x="450.0" y="469" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Clase de absorción sonora  A a E   (Tabla B.1, Anexo B)</text><text x="450.0" y="489" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">o «No clasificado» cuando αw cae por debajo de la banda de clase E</text></svg>