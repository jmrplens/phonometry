<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560"><rect width="900" height="560" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Multirate decimation in the octave filter bank</text><rect x="36" y="150" width="136" height="70" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="104" y="180" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#e6e6e6" text-anchor="middle" font-weight="600">Signal</text><text x="104" y="205" font-family="Consolas, Menlo, monospace" font-size="18" fill="#9a9a9a" text-anchor="middle">fs = 48 kHz</text><line x1="172" y1="185" x2="439.0526998323749" y2="155.97253262691578" stroke="#e6e6e6" stroke-width="1.6" stroke-linecap="round"/><path d="M 448.0 155.0 L 439.4 159.6 L 438.7 152.4 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="455.0" y="120.0" width="190" height="70" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="550.0" y="150.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle" font-weight="600">16 kHz band</text><text x="550.0" y="174.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#e46a6a" text-anchor="middle">SOS @ fs</text><text x="720" y="160.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#9a9a9a" text-anchor="middle"></text><line x1="172" y1="185" x2="234.17116421914014" y2="258.1425461401649" stroke="#e6e6e6" stroke-width="1.6" stroke-linecap="round"/><path d="M 240.0 265.0 L 231.4 260.5 L 236.9 255.8 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="250" y="230.0" width="150" height="70" rx="10" fill="#1c2128" stroke="#9a9a9a" stroke-width="1.6"/><text x="325" y="260.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle">Anti-alias</text><text x="325" y="284.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#9a9a9a" text-anchor="middle">LPF + ↓M</text><line x1="400" y1="265.0" x2="439.0" y2="265.0" stroke="#e6e6e6" stroke-width="1.6" stroke-linecap="round"/><path d="M 448.0 265.0 L 439.0 268.6 L 439.0 261.4 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="455.0" y="230.0" width="190" height="70" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="550.0" y="260.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle" font-weight="600">1 kHz band</text><text x="550.0" y="284.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#4da3d8" text-anchor="middle">SOS @ fs / 8</text><text x="720" y="270.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#9a9a9a" text-anchor="middle">6 kHz</text><line x1="172" y1="185" x2="236.96732264947525" y2="366.52634269706317" stroke="#e6e6e6" stroke-width="1.6" stroke-linecap="round"/><path d="M 240.0 375.0 L 233.6 367.7 L 240.4 365.3 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="250" y="340.0" width="150" height="70" rx="10" fill="#1c2128" stroke="#9a9a9a" stroke-width="1.6"/><text x="325" y="370.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle">Anti-alias</text><text x="325" y="394.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#9a9a9a" text-anchor="middle">LPF + ↓M</text><line x1="400" y1="375.0" x2="439.0" y2="375.0" stroke="#e6e6e6" stroke-width="1.6" stroke-linecap="round"/><path d="M 448.0 375.0 L 439.0 378.6 L 439.0 371.4 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="455.0" y="340.0" width="190" height="70" rx="10" fill="#1c2128" stroke="#5abf5a" stroke-width="2"/><text x="550.0" y="370.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle" font-weight="600">63 Hz band</text><text x="550.0" y="394.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#5abf5a" text-anchor="middle">SOS @ fs / 64</text><text x="720" y="380.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#9a9a9a" text-anchor="middle">750 Hz</text><text x="450" y="480" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle">Low bands are filtered at a decimated rate: the relative</text><text x="450" y="508" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle">bandwidth stays wide, so the SOS stays numerically healthy.</text></svg>