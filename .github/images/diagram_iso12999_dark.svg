<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"><rect width="900" height="500" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Measurement uncertainty from tables to expanded U (ISO 12999-1)</text><rect x="118.0" y="48" width="664.0" height="60.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Standard uncertainty  u  — reproducibility read from the tables</text><text x="450.0" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">bands: Tables 2/4 · ratings: Tables 3/5 · situation A (σR) / B (σsitu) / C (σr)</text><line x1="450.0" y1="108" x2="450.0" y2="129.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 138.0 L 446.4 129.0 L 453.6 129.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="118.0" y="138" width="664.0" height="60.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="163" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Reduce by  m  independent measurements   u/√m   (Formula A.7)</text><text x="450.0" y="183" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">and combine model with reality per Annex A when predicting</text><rect x="118.0" y="226" width="664.0" height="60.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="450.0" y="251" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Combine uncorrelated contributions   uc = √(Σ u_i²)   (Formula C.2)</text><text x="450.0" y="271" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">single-number combination of Annex B uses Formula B.2</text><rect x="118.0" y="314" width="664.0" height="60.0" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="450.0" y="339" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Expand   U = k·u   (Formula 2),   k from Table 8   (k ≥ 1)</text><text x="450.0" y="359" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">the coverage factor depends on the reported quantity and situation</text><line x1="450.0" y1="198" x2="450.0" y2="217.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 226.0 L 446.4 217.0 L 453.6 217.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="286" x2="450.0" y2="305.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 314.0 L 446.4 305.0 L 453.6 305.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="374" x2="450.0" y2="395.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 404.0 L 446.4 395.0 L 453.6 395.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="118.0" y="404" width="320.0" height="66" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.2"/><text x="278.0" y="430" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#e6e6e6" text-anchor="middle" font-weight="600">Report   Y = y ± U   (Formula 3)</text><text x="278.0" y="452" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">two-sided coverage factor</text><rect x="462.0" y="404" width="320.0" height="66" rx="10" fill="none" stroke="#e46a6a" stroke-width="2.2"/><text x="622.0" y="430" font-family="Segoe UI, Helvetica, 