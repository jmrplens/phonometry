<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460"><rect width="900" height="460" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Exponential-detector chain of the time weightings (IEC 61672-1)</text><rect x="51.0" y="108.0" width="150.0" height="90.0" rx="12" fill="none" stroke="#e6e6e6" stroke-width="2.2"/><text x="126.0" y="146.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#e6e6e6" text-anchor="middle" font-weight="600">p(t)</text><text x="126.0" y="172.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#e6e6e6" text-anchor="middle">band signal</text><line x1="202.0" y1="153.0" x2="202.0" y2="153.0" stroke="#e6e6e6" stroke-width="2" stroke-linecap="round"/><path d="M 211.0 153.0 L 202.0 156.6 L 202.0 149.4 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="213.0" y="108.0" width="150.0" height="90.0" rx="12" fill="#1c2128" stroke="#4da3d8" stroke-width="2.2"/><text x="288.0" y="146.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#e6e6e6" text-anchor="middle" font-weight="600">( · )²</text><text x="288.0" y="172.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#4da3d8" text-anchor="middle">square</text><line x1="364.0" y1="153.0" x2="364.0" y2="153.0" stroke="#e6e6e6" stroke-width="2" stroke-linecap="round"/><path d="M 373.0 153.0 L 364.0 156.6 L 364.0 149.4 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="375.0" y="108.0" width="150.0" height="90.0" rx="12" fill="#1c2128" stroke="#4da3d8" stroke-width="2.2"/><text x="450.0" y="146.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#e6e6e6" text-anchor="middle" font-weight="600">one-pole RC</text><text x="450.0" y="172.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#4da3d8" text-anchor="middle">time constant τ</text><line x1="526.0" y1="153.0" x2="526.0" y2="153.0" stroke="#e6e6e6" stroke-width="2" stroke-linecap="round"/><path d="M 535.0 153.0 L 526.0 156.6 L 526.0 149.4 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="537.0" y="108.0" width="150.0" height="90.0" rx="12" fill="#1c2128" stroke="#5abf5a" stroke-width="2.2"/><text x="612.0" y="146.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#e6e6e6" text-anchor="middle" font-weight="600">10·lg(·/p₀²)</text><text x="612.0" y="172.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#5abf5a" text-anchor="middle">to decibels</text><line x1="688.0" y1="153.0" x2="688.0" y2="153.0" stroke="#e6e6e6" stroke-width="2" stroke-linecap="round"/><path d="M 697.0 153.0 L 688.0 156.6 L 688.0 149.4 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="699.0" y="108.0" width="150.0" height="90.0" rx="12" fill="none" stroke="#e46a6a" stroke-width="2.2"/><text x="774.0" y="146.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#e6e6e6" text-anchor="middle" font-weight="600">L_τ(t)</text><text x="774.0" y="172.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#e46a6a" text-anchor="middle">time-weighted level</text><rect x="130" y="246" width="640" height="70" rx="10" fill="#1c2128" stroke="#9a9a9a" stroke-width="1.6"/><text x="450" y="275" font-family="Consolas, Menlo, monospace" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">y[n] = α·x²[n] + (1 − α)·y[n−1],   α = 1 − e^(−1/(fs·τ))</text><text x="450" y="299" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">a first-order low-pass on the squared signal → the mean-square envelope</text><rect x="120.0" y="350" width="210.0" height="74" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.2"/><text x="225.0" y="380" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Fast (F)</text><text x="225.0" y="404" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">τ = 125 ms</text><rect x="345.0" y="350" width="210.0" height="74" rx="10" fill="none" stroke="#5abf5a" stroke-width="2.2"/><text x="450.0" y="380" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Slow (S)</text><text x="450.0" y="404" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">τ = 1000 ms</text><rect x="570.0" y="350" width="210.0" height="74" rx="10" fill="none" stroke="#e46a6a" stroke-width="2.2"/><text x="675.0" y="380" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Impulse (I)</text><text x="675.0" y="404" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">35 ms rise · 1500 ms fall</text></svg>