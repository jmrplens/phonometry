<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580"><rect width="900" height="580" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Room-noise rating methods (ANSI/ASA S12.2-2019): NC and RC Mark II</text><rect x="180.0" y="56" width="540.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="84" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle" font-weight="600">Octave-band sound pressure levels  L(f)</text><text x="450.0" y="106" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9a9a9a" text-anchor="middle">16 Hz – 8000 Hz</text><line x1="450.0" y1="118" x2="240.85221883805474" y2="156.37573966274226" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 158.0 L 240.2 152.8 L 241.5 159.9 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="118" x2="659.1477811619452" y2="156.37573966274226" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 158.0 L 658.5 159.9 L 659.8 152.8 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="46.0" y="158" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="232.0" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">NC — tangency method</text><text x="232.0" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">Table 1 curves</text><rect x="46.0" y="256" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="232.0" y="283" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">NC value in each band</text><text x="232.0" y="304" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">curve level = L(f) at that f</text><rect x="46.0" y="354" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="232.0" y="381" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">NC = highest curve touched</text><text x="232.0" y="402" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">note the governing band</text><line x1="232.0" y1="220" x2="232.0" y2="247.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 256.0 L 228.4 247.0 L 235.6 247.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="232.0" y1="318" x2="232.0" y2="345.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 354.0 L 228.4 345.0 L 235.6 345.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="232.0" y1="416" x2="232.0" y2="461.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 470.0 L 228.4 461.0 L 235.6 461.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="46.0" y="470" width="372.0" height="58" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.4"/><text x="232.0" y="505" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="23" fill="#e6e6e6" text-anchor="middle" font-weight="600">NC-NN (band)</text><rect x="482.0" y="158" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="668.0" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">RC Mark II  (Annex D)</text><text x="668.0" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">−5 dB/octave curves</text><rect x="482.0" y="256" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="668.0" y="283" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">LMF = (L500 + L1000 + L2000) / 3</text><text x="668.0" y="304" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">RC = round(LMF)   (clause D.4)</text><line x1="668.0" y1="220" x2="668.0" y2="247.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 256.0 L 664.4 247.0 L 671.6 247.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="668.0" y1="318" x2="668.0" y2="345.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 354.0 L 664.4 345.0 L 671.6 345.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="482.0" y="354" width="372.0" height="116" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="668.0" y="379" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Spectral tag  (clause D.3)</text><text x="500.0" y="403" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#e6e6e6" text-anchor="start">R  rumble: a band ≤ 500 Hz exceeds RC by &gt; 5 dB</text><text x="500.0" y="425" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#e6e6e6" text-anchor="start">H  hiss: a band ≥ 1000 Hz exceeds RC by &gt; 3 dB</text><text x="500.0" y="447" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#e6e6e6" text-anchor="start">N  neutral: within both tolerances</text><line x1="668.0" y1="470" x2="668.0" y2="481.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 490.0 L 664.4 481.0 L 671.6 481.0 Z" fill="#e6e6e6" stroke="no