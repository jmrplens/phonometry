[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "PyOctaveBand"
dynamic = ["version"]
authors = [
  { name="Jose Manuel Requena Plens", email="jmrplens@gmail.com" },
]
description = "Octave-Band and Fractional Octave-Band filter for signals in time domain."
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "numpy>=2.4.4",
    "scipy>=1.17.1",
    "matplotlib>=3.10.9",
    "numba>=0.65.1",
]

[project.urls]
"Homepage" = "https://github.com/jmrplens/PyOctaveBand"
"Bug Tracker" = "https://github.com/jmrplens/PyOctaveBand/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = {attr = "pyoctaveband._version.__version__"}

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["tests", ".venv"]

[tool.coverage.run]
relative_files = true

[tool.pytest.ini_options]
filterwarnings = [
    "ignore:Low sampling rate:UserWarning",
]