<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470"><rect width="900" height="470" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Noise-induced hearing loss (ISO 1999): NIPTS and HTLAN</text><rect x="46.0" y="56" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="232.0" y="83" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Age Y,  sex,  fractile Q</text><text x="232.0" y="104" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">database A = ISO 7029</text><rect x="482.0" y="56" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="668.0" y="83" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Exposure L_EX,8h,  t years</text><text x="668.0" y="104" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">normalized to 8 h / 5 days</text><line x1="232.0" y1="118" x2="232.0" y2="141.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 150.0 L 228.4 141.0 L 235.6 141.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="46.0" y="150" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="232.0" y="177" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Age threshold  H  (HTLA)</text><text x="232.0" y="198" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">ISO 7029 fractile, dB</text><line x1="668.0" y1="118" x2="668.0" y2="141.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 150.0 L 664.4 141.0 L 671.6 141.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="482.0" y="150" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="668.0" y="177" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Median NIPTS  N50  (6.3.1)</text><text x="668.0" y="198" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">N50 = [u + v·lg(t/t0)]·(L − L0)²</text><line x1="668.0" y1="212" x2="668.0" y2="235.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 244.0 L 664.4 235.0 L 671.6 235.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="482.0" y="244" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="668.0" y="271" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Fractile NIPTS  N  (6.3.2)</text><text x="668.0" y="292" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">N = N50 + z·(du if z ≥ 0 else dl)</text><line x1="232.0" y1="212" x2="327.2300095399714" y2="364.3680152639542" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 332.0 372.0 L 324.2 366.3 L 330.3 362.5 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="668.0" y1="306" x2="575.5114846590556" y2="367.04242012502334" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 568.0 372.0 L 573.5 364.0 L 577.5 370.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="264.0" y="372.0" width="372.0" height="66" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.4"/><text x="450.0" y="401.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle" font-weight="600">HTLAN   H' = H + N − H·N / 120</text><text x="450.0" y="423.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">threshold from age and noise  (Formula 1, 6.1)</text></svg>