<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580"><rect width="900" height="580" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Multiple-shock spinal-response dose and injury risk (ISO 2631-5)</text><rect x="120.0" y="48" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#e6e6e6" text-anchor="middle" font-weight="600">Vertical seat acceleration  az(t)</text><text x="450.0" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">band-limited per ISO 2631-1  (0.4 Hz to 100 Hz)</text><line x1="450.0" y1="106" x2="450.0" y2="127.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 136.0 L 446.4 127.0 L 453.6 127.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="120.0" y="136" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="450.0" y="161" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Spinal response  Az(t)  (clause 5.2, Formula 1/2)</text><text x="450.0" y="181" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">seat-to-spine transfer function H(f): 1 zero, 6 poles</text><rect x="120.0" y="224" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="249" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Acceleration dose  Dz = 1.07·(Σ Az,i^6)^(1/6)  (Formula 3)</text><text x="450.0" y="269" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">Az,i = positive peaks;   daily dose Dzd = Dz·(td/tm)^(1/6)</text><rect x="120.0" y="312" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="337" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Compressive stress  Sd = mz·Dzd  (Annex C, Formula C.1)</text><text x="450.0" y="357" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">mz = 0.029 (male) / 0.025 (female) MPa per m/s²</text><rect x="120.0" y="400" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="450.0" y="425" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Stress variable  R = [Σ (Sd·N^(1/6) / (Su − Sstat))^6]^(1/6)</text><text x="450.0" y="445" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">Su = 6.75 − Sage·(b+i) MPa, cumulated over exposure years (C.3/C.4)</text><line x1="450.0" y1="196" x2="450.0" y2="215.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 224.0 L 446.4 215.0 L 453.6 215.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="284" x2="450.0" y2="303.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 312.0 L 446.4 303.0 L 453.6 303.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="372" x2="450.0" y2="391.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 400.0 L 446.4 391.0 L 453.6 391.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="460" x2="450.0" y2="479.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 488.0 L 446.4 479.0 L 453.6 479.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="120.0" y="488" width="660.0" height="58" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.4"/><text x="450.0" y="513" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Injury probability  P(R) = 1 − exp(−(R/α)^β)  (Formula C.5)</text><text x="450.0" y="533" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">Weibull risk of lumbar injury, by sex (Table C.1/C.2)</text></svg>