<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540"><rect width="900" height="540" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Uncertainty: GUM propagation vs Monte Carlo (Guide 98-3)</text><rect x="170.0" y="56" width="560.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="84" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#e6e6e6" text-anchor="middle" font-weight="600">Measurement model  y = f(x_1, …, x_N)</text><text x="450.0" y="106" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9a9a9a" text-anchor="middle">input estimates x_i with standard uncertainties u(x_i)</text><line x1="450.0" y1="118" x2="240.85221883805474" y2="156.37573966274226" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 158.0 L 240.2 152.8 L 241.5 159.9 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="118" x2="659.1477811619452" y2="156.37573966274226" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 158.0 L 658.5 159.9 L 659.8 152.8 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="46.0" y="158" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="232.0" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">Law of propagation  (GUM 5)</text><text x="232.0" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">sensitivity c_i = ∂f / ∂x_i</text><rect x="46.0" y="250" width="372.0" height="62.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="232.0" y="277" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18