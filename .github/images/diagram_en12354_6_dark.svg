<svg xmlns="http://www.w3.org/2000/svg" width="900" height="410" viewBox="0 0 900 410"><rect width="900" height="410" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Absorption area and reverberation time of a room (EN 12354-6)</text><rect x="120.0" y="48" width="320.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="280.0" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Surfaces  (Si, αs,i)</text><text x="280.0" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">area and absorption per band</text><rect x="460.0" y="48" width="320.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="620.0" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Objects  (Vobj)</text><text x="620.0" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">Aobj = Vobj^(2/3)  (Formula 4)</text><line x1="280.0" y1="106" x2="381.64370978203266" y2="146.65748391281306" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 390.0 150.0 L 380.3 150.0 L 383.0 143.3 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="620.0" y1="106" x2="518.3562902179673" y2="146.65748391281306" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 510.0 150.0 L 517.0 143.3 L 519.7 150.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="120.0" y="150" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="450.0" y="175" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Equivalent absorption area  A  (clause 4.3, Formula 1)</text><text x="450.0" y="195" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">A = Σ αs,i·Si + Σ Aobj + Aair;   Aair = 4·m·V·(1 − ψ)  (Formula 2)</text><rect x="120.0" y="238" width="660.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="263" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Object fraction  ψ = Σ Vobj / V   (Formula 3)</text><text x="450.0" y="283" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">air absorption negligible below 1 kHz for V &lt; 200 m³</text><line x1="450.0" y1="210" x2="450.0" y2="229.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 238.0 L 446.4 229.0 L 453.6 229.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="296" x2="450.0" y2="315.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 324.0 L 446.4 315.0 L 453.6 315.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="120.0" y="324" width="660.0" height="58" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.4"/><text x="450.0" y="349" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Reverberation time  T = 55.3/c₀ · V·(1 − ψ) / A  (Formula 5)</text><text x="450.0" y="369" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">c₀ = 345.6 m/s so 55.3/c₀ = 0.16  (clause 4.4)</text></svg>