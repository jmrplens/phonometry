<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540"><rect width="900" height="540" fill="#ffffff"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#1a1a1a" text-anchor="middle">Incertidumbre: propagación GUM frente a Monte Carlo (Guía 98-3)</text><rect x="170.0" y="56" width="560.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="450.0" y="84" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle" font-weight="600">Modelo de medida  y = f(x_1, …, x_N)</text><text x="450.0" y="106" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#666666" text-anchor="middle">estimaciones de entrada x_i con incertidumbres típicas u(x_i)</text><line x1="450.0" y1="118" x2="240.85221883805474" y2="156.37573966274226" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 158.0 L 240.2 152.8 L 241.5 159.9 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="118" x2="659.1477811619452" y2="156.37573966274226" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 158.0 L 658.5 159.9 L 659.8 152.8 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="46.0" y="158" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#1f77b4" stroke-width="2"/><text x="232.0" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Ley de propagación  (GUM 5)</text><text x="232.0" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">sensibilidad c_i = ∂f / ∂x_i</text><rect x="46.0" y="250" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="232.0" y="277" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Combinación en cuadratura</text><text x="232.0" y="298" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">uc² = Σ c_i² u²(x_i) + correlación</text><rect x="46.0" y="342" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="232.0" y="369" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Grados de libertad efectivos  (Anexo G.4)</text><text x="232.0" y="390" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">v_eff — Welch–Satterthwaite</text><line x1="232.0" y1="220" x2="232.0" y2="241.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 250.0 L 228.4 241.0 L 235.6 241.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="232.0" y1="312" x2="232.0" y2="333.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 342.0 L 228.4 333.0 L 235.6 333.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="232.0" y1="404" x2="232.0" y2="425.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 232.0 434.0 L 228.4 425.0 L 235.6 425.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="46.0" y="434" width="372.0" height="58" rx="10" fill="none" stroke="#1f77b4" stroke-width="2.4"/><text x="232.0" y="462" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#1a1a1a" text-anchor="middle" font-weight="600">U = k · uc</text><text x="232.0" y="482" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">k = t_p(v_eff)   (cláusula 6)</text><rect x="482.0" y="158" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#d62728" stroke-width="2"/><text x="668.0" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Monte Carlo  (Supl. 1, 7)</text><text x="668.0" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">muestrear x_i de su PDF g(x_i)</text><rect x="482.0" y="250" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="668.0" y="277" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Propagar M ensayos</text><text x="668.0" y="298" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">y_r = f(x_1r, …, x_Nr)</text><rect x="482.0" y="342" width="372.0" height="62.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="668.0" y="369" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="600">Ordenar {y_r}, tomar fractiles</text><text x="668.0" y="390" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">intervalo simétrico en prob. al 95 %</text><line x1="668.0" y1="220" x2="668.0" y2="241.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 250.0 L 664.4 241.0 L 671.6 241.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="668.0" y1="312" x2="668.0" y2="333.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 342.0 L 664.4 333.0 L 671.6 333.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="668.0" y1="404" x2="668.0" y2="425.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 668.0 434.0 L 664.4 425.0 L 671.6 425.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="482.0" y="434" width="372.0" height="58" rx="10" fill="none" stroke="#d62728" stroke-width="2.4"/><text x="668.0" y="462" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#1a1a1a" text-anchor="middle" font-weight="600">intervalo de cobertura</text><text x="668.0" y="482" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">[y_low, y_high]   (cláusula 7.7)</text></svg>