<svg xmlns="http://www.w3.org/2000/svg" width="900" height="490" viewBox="0 0 900 490"><rect width="900" height="490" fill="#0d1117"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#e6e6e6" text-anchor="middle">Zwicker loudness model chain (ISO 532-1)</text><rect x="116.0" y="46" width="668.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="70" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#e6e6e6" text-anchor="middle" font-weight="600">28 one-third-octave band levels, 25 Hz to 12.5 kHz</text><text x="450.0" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">from a spectrum, or from a calibrated signal via the Annex A filterbank</text><line x1="450.0" y1="104" x2="450.0" y2="123.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 132.0 L 446.4 123.0 L 453.6 123.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="116.0" y="132" width="668.0" height="58.0" rx="10" fill="#1c2128" stroke="#4da3d8" stroke-width="2"/><text x="450.0" y="157" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Transmission a₀ and lower critical bands  (Clause 5.4, Table A.4)</text><text x="450.0" y="177" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">free/diffuse-field correction; 25-250 Hz grouped into 3 critical bands</text><rect x="116.0" y="218" width="668.0" height="58.0" rx="10" fill="#1c2128" stroke="#e6e6e6" stroke-width="2"/><text x="450.0" y="243" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Core loudness of the 20 critical bands  (Tables A.4-A.7)</text><text x="450.0" y="263" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">with the threshold in quiet LTQ (Table A.3)</text><rect x="116.0" y="304" width="668.0" height="58.0" rx="10" fill="#1c2128" stroke="#e46a6a" stroke-width="2"/><text x="450.0" y="329" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Specific loudness  N′(z)  over 0.1-Bark steps to 24 Bark</text><text x="450.0" y="349" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9a9a9a" text-anchor="middle">upper masking slopes added band to band (Table A.9)</text><line x1="450.0" y1="190" x2="450.0" y2="209.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 218.0 L 446.4 209.0 L 453.6 209.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="276" x2="450.0" y2="295.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 304.0 L 446.4 295.0 L 453.6 295.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="362" x2="450.0" y2="383.0" stroke="#e6e6e6" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 392.0 L 446.4 383.0 L 453.6 383.0 Z" fill="#e6e6e6" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="116.0" y="392" width="668.0" height="60" rx="10" fill="none" stroke="#4da3d8" stroke-width="2.4"/><text x="450.0" y="417" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#e6e6e6" text-anchor="middle" font-weight="600">Total loudness  N = ∫ N′(z) dz  [sone]</text><text x="450.0" y="438" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#9a9a9a" text-anchor="middle">loudness level  LN = 40 + 10·log₂ N  [phon]</text></svg>