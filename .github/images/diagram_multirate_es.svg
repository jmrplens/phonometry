<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560"><rect width="900" height="560" fill="#ffffff"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#1a1a1a" text-anchor="middle">Decimación multitasa en el banco de filtros de octava</text><rect x="36" y="150" width="136" height="70" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="104" y="180" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#1a1a1a" text-anchor="middle" font-weight="600">Señal</text><text x="104" y="205" font-family="Consolas, Menlo, monospace" font-size="18" fill="#666666" text-anchor="middle">fs = 48 kHz</text><line x1="172" y1="185" x2="439.0526998323749" y2="155.97253262691578" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/><path d="M 448.0 155.0 L 439.4 159.6 L 438.7 152.4 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="455.0" y="120.0" width="190" height="70" rx="10" fill="#f0f2f5" stroke="#d62728" stroke-width="2"/><text x="550.0" y="150.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle" font-weight="600">Banda de 16 kHz</text><text x="550.0" y="174.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#d62728" text-anchor="middle">SOS @ fs</text><text x="720" y="160.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#666666" text-anchor="middle"></text><line x1="172" y1="185" x2="234.17116421914014" y2="258.1425461401649" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/><path d="M 240.0 265.0 L 231.4 260.5 L 236.9 255.8 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="250" y="230.0" width="150" height="70" rx="10" fill="#f0f2f5" stroke="#666666" stroke-width="1.6"/><text x="325" y="260.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle">Antialias</text><text x="325" y="284.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#666666" text-anchor="middle">LPF + ↓M</text><line x1="400" y1="265.0" x2="439.0" y2="265.0" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/><path d="M 448.0 265.0 L 439.0 268.6 L 439.0 261.4 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="455.0" y="230.0" width="190" height="70" rx="10" fill="#f0f2f5" stroke="#1f77b4" stroke-width="2"/><text x="550.0" y="260.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle" font-weight="600">Banda de 1 kHz</text><text x="550.0" y="284.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#1f77b4" text-anchor="middle">SOS @ fs / 8</text><text x="720" y="270.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#666666" text-anchor="middle">6 kHz</text><line x1="172" y1="185" x2="236.96732264947525" y2="366.52634269706317" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/><path d="M 240.0 375.0 L 233.6 367.7 L 240.4 365.3 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="250" y="340.0" width="150" height="70" rx="10" fill="#f0f2f5" stroke="#666666" stroke-width="1.6"/><text x="325" y="370.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle">Antialias</text><text x="325" y="394.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#666666" text-anchor="middle">LPF + ↓M</text><line x1="400" y1="375.0" x2="439.0" y2="375.0" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/><path d="M 448.0 375.0 L 439.0 378.6 L 439.0 371.4 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="455.0" y="340.0" width="190" height="70" rx="10" fill="#f0f2f5" stroke="#2ca02c" stroke-width="2"/><text x="550.0" y="370.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle" font-weight="600">Banda de 63 Hz</text><text x="550.0" y="394.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#2ca02c" text-anchor="middle">SOS @ fs / 64</text><text x="720" y="380.0" font-family="Consolas, Menlo, monospace" font-size="18" fill="#666666" text-anchor="middle">750 Hz</text><text x="450" y="480" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle">Las bandas graves se filtran a frecuencia decimada: el ancho</text><text x="450" y="508" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle">relativo se mantiene amplio y las SOS siguen bien condicionadas.</text></svg>