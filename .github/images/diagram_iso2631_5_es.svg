<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580"><rect width="900" height="580" fill="#ffffff"/><text x="450.0" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#1a1a1a" text-anchor="middle">Dosis espinal por choques múltiples y riesgo de lesión (ISO 2631-5)</text><rect x="120.0" y="48" width="660.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="450.0" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#1a1a1a" text-anchor="middle" font-weight="600">Aceleración vertical del asiento  az(t)</text><text x="450.0" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">limitada en banda según ISO 2631-1  (0,4 Hz a 100 Hz)</text><line x1="450.0" y1="106" x2="450.0" y2="127.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 136.0 L 446.4 127.0 L 453.6 127.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="120.0" y="136" width="660.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#1f77b4" stroke-width="2"/><text x="450.0" y="161" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Respuesta de la columna  Az(t)  (cláusula 5.2, Fórmula 1/2)</text><text x="450.0" y="181" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">función de transferencia asiento-columna H(f): 1 cero, 6 polos</text><rect x="120.0" y="224" width="660.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="450.0" y="249" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Dosis de aceleración  Dz = 1.07·(Σ Az,i^6)^(1/6)  (Fórmula 3)</text><text x="450.0" y="269" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">Az,i = picos positivos;   dosis diaria Dzd = Dz·(td/tm)^(1/6)</text><rect x="120.0" y="312" width="660.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#1a1a1a" stroke-width="2"/><text x="450.0" y="337" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Tensión compresiva  Sd = mz·Dzd  (Anexo C, Fórmula C.1)</text><text x="450.0" y="357" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">mz = 0.029 (hombre) / 0.025 (mujer) MPa por m/s²</text><rect x="120.0" y="400" width="660.0" height="58.0" rx="10" fill="#f0f2f5" stroke="#d62728" stroke-width="2"/><text x="450.0" y="425" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Variable de tensión  R = [Σ (Sd·N^(1/6) / (Su − Sstat))^6]^(1/6)</text><text x="450.0" y="445" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">Su = 6.75 − Sage·(b+i) MPa, acumulada sobre los años de exposición (C.3/C.4)</text><line x1="450.0" y1="196" x2="450.0" y2="215.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 224.0 L 446.4 215.0 L 453.6 215.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="284" x2="450.0" y2="303.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 312.0 L 446.4 303.0 L 453.6 303.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="372" x2="450.0" y2="391.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 400.0 L 446.4 391.0 L 453.6 391.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><line x1="450.0" y1="460" x2="450.0" y2="479.0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/><path d="M 450.0 488.0 L 446.4 479.0 L 453.6 479.0 Z" fill="#1a1a1a" stroke="none" stroke-width="1.5" stroke-linejoin="round"/><rect x="120.0" y="488" width="660.0" height="58" rx="10" fill="none" stroke="#1f77b4" stroke-width="2.4"/><text x="450.0" y="513" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle" font-weight="600">Probabilidad de lesión  P(R) = 1 − exp(−(R/α)^β)  (Fórmula C.5)</text><text x="450.0" y="533" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">riesgo de lesión lumbar de Weibull, por sexo (Tabla C.1/C.2)</text></svg>